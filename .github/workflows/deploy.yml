name: Deploy Mosaic Agent to PROD

on:
  push:
    branches:
      - main

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST_CICD }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_CICD }}
      UC_MODEL_NAME: cicd.gold.mosaic_nl_sql_agent

    steps:
      # ── STEP 1: Checkout ──────────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v3

      # ── STEP 2: Setup Python ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # ── STEP 3: Install Databricks CLI (Official Action) ─────────────────
      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      # ── STEP 3c: Install Python deps for helper scripts ───────────────────
      - name: Install Python dependencies
        run: pip install mlflow databricks-sdk langchain==0.2.16 langchain-community==0.2.17 langchain-core==0.2.41 requests --quiet

      # ── STEP 3b: Verify Auth ──────────────────────────────────────────────
      - name: Verify Databricks Auth
        run: |
          databricks --version
          databricks current-user me
          echo "✅ Authenticated to Databricks"

      # ── STEP 4: Deploy Bundle to Workspace ───────────────────────────────
      - name: Deploy DABs Bundle
        run: |
          databricks bundle deploy --target default
          echo "✅ Bundle deployed to Databricks workspace"

      # ── STEP 5: Run Evaluation Job (Quality + Security Gate) ─────────────
      - name: Run Evaluation (test.py via DABs)
        id: run_eval
        run: |
          echo "🧪 Running evaluation job on ephemeral cluster..."
          # bundle run exits 1 if job fails (sys.exit(1) from quality gate flows through)
          # No || true — we WANT this to fail the pipeline if accuracy < 80%
          if databricks bundle run mosaic_eval; then
            echo "eval_passed=true" >> $GITHUB_OUTPUT
            echo "✅ Evaluation PASSED — accuracy >= 80%"
          else
            echo "eval_passed=false" >> $GITHUB_OUTPUT
            echo "🚨 Evaluation FAILED — accuracy < 80% or guardrail violation"
            exit 1
          fi

      # ── STEP 6: Publish Step Summary (GitHub UI) ─────────────────────────
      - name: Publish Evaluation Summary
        if: always()
        run: |
          echo "## 🧪 Mosaic Agent Evaluation Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Git SHA** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Quality Gate** | ≥ 80% accuracy required |" >> $GITHUB_STEP_SUMMARY
          echo "| **Model** | \`cicd.gold.mosaic_nl_sql_agent\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ steps.run_eval.outputs.eval_passed == 'true' && '✅ PASSED' || '❌ FAILED' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Pipeline Details" >> $GITHUB_STEP_SUMMARY
          echo "- **Compute**: Ephemeral single-node cluster via DABs" >> $GITHUB_STEP_SUMMARY
          echo "- **Evaluation**: 5 smoke + 30 golden questions" >> $GITHUB_STEP_SUMMARY
          echo "- **Guardrails**: SQL safety + RAI output validation" >> $GITHUB_STEP_SUMMARY

      # ── STEP 7a: Save current @PROD version (for rollback safety) ────────
      # Read the alias BEFORE touching anything so we can restore it if
      # the next step fails.  Output: prod_version = "3" | "none"
      - name: Save Current @PROD Version
        id: save_prod
        if: success()
        run: |
          PROD_VER=$(python scripts/get_prod_version.py)
          echo "prod_version=${PROD_VER}" >> $GITHUB_OUTPUT
          echo "📌 Current @PROD version: ${PROD_VER}"

      # ── STEP 7b: Register Model (only if eval passes) ─────────────────────
      - name: Register Model in Unity Catalog
        id: register_model
        if: success()
        run: |
          echo "📦 Registering model to Unity Catalog..."
          databricks bundle run mosaic_register
          echo "✅ Model registered with @PROD alias"

          # Add registration info to summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Model registered: \`cicd.gold.mosaic_nl_sql_agent\`" >> $GITHUB_STEP_SUMMARY
          echo "- Alias \`@PROD\` updated to latest version" >> $GITHUB_STEP_SUMMARY
          echo "- Git SHA: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      # ── STEP 8: Rollback @PROD if registration failed ─────────────────────
      # Runs ONLY when the register step fails.  Re-points @PROD to the
      # version we saved in Step 7a → production is never left broken.
      - name: Rollback @PROD on Registration Failure
        if: failure() && steps.save_prod.outputs.prod_version != ''
        run: |
          echo "🚨 Registration failed — rolling back @PROD..."
          python scripts/rollback_prod.py --version ${{ steps.save_prod.outputs.prod_version }}

          # Surface rollback in the Job Summary
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Rollback" >> $GITHUB_STEP_SUMMARY
          echo "- Registration failed — @PROD restored to version \`${{ steps.save_prod.outputs.prod_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Production traffic unaffected" >> $GITHUB_STEP_SUMMARY
