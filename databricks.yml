# Databricks Asset Bundle configuration
# Used by DABs CLI: `databricks bundle deploy` / `databricks bundle run`
# See: https://docs.databricks.com/dev-tools/bundles/index.html
#
# Fix 4: dev + prod targets using Unity Catalog schema isolation
# Fix 5: Smoke eval (5 questions) + Full eval (30 questions) job split

bundle:
  name: mosaic-nl-sql-agent

workspace:
  host: https://adb-7405619257134796.16.azuredatabricks.net

# ── Bundle-level variables (overridden per target) ───────────────────────────
variables:
  catalog:
    default: cicd_dev

resources:
  jobs:
    # ── SMOKE EVAL (PR — fast, 5 questions, keyword gates only) ──────────────
    mosaic_smoke_eval:
      name: "mosaic-agent-smoke-eval"
      tasks:
        - task_key: smoke_test
          notebook_task:
            notebook_path: ./tests/test.py
            base_parameters:
              eval_mode: "smoke"
              golden_set: "smoke_set.csv"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

    # ── FULL EVAL (main merge — 30 questions + all CI gates) ─────────────────
    mosaic_full_eval:
      name: "mosaic-agent-full-eval"
      tasks:
        - task_key: full_test
          notebook_task:
            notebook_path: ./tests/test.py
            base_parameters:
              eval_mode: "full"
              golden_set: "golden_set.csv"
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

    # ── REGISTRATION JOB (only after eval passes) ────────────────────────────
    mosaic_register:
      name: "mosaic-agent-register"
      tasks:
        - task_key: register_model
          notebook_task:
            notebook_path: ./scripts/register_model.py
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "Standard_D4s_v3"
            num_workers: 0
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.cluster.profile: singleNode
              spark.master: "local[*]"
            custom_tags:
              ResourceClass: SingleNode

# ── TARGETS: dev (default) and prod ──────────────────────────────────────────
targets:
  dev:
    default: true
    variables:
      catalog: cicd_dev

  prod:
    variables:
      catalog: cicd_prod

# Sync — files pushed to Databricks workspace on `bundle deploy`
# Use sync.include for non-YAML files (Python, CSV, txt, etc.)
sync:
  include:
    - "agents/*.py"
    - "prompts/*.txt"
    - "eval/*.py"
    - "eval/*.csv"
    - "tests/*.py"
    - "scripts/*.py"
